<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Outfit Stylist</title>
<link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f5f6fa;
    color: #333;
    padding: 40px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
}

form {
    background: white;
    max-width: 600px;
    margin: auto;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

select,
input {
    padding: 10px;
    width: 180px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button {
    padding: 10px 25px;
    background: #111;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

.weather {
    text-align: center;
    margin-top: 25px;
    font-size: 18px;
}

.container {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: contain; /* ensures full image is visible */
    background: #f5f6fa;
}

.card-content {
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.title {
    font-size: 14px;
    height: 40px;
    overflow: hidden;
    text-overflow: ellipsis;
}

.price {
    margin-top: 6px;
    font-weight: bold;
    color: #111;
}

.stores {
    margin-top: 10px;
    display: flex;
    gap: 6px;
}

.store-btn {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 5px;
    font-size: 12px;
    color: white;
    text-decoration: none;
    transition: 0.2s;
    background: #ff9900; /* Amazon orange */
}

.store-btn:hover {
    opacity: 0.9;
}

.map-section {
    margin-top: 60px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.map-section h2 {
    margin-bottom: 15px;
}

iframe {
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>👗 AI Outfit Stylist</h1>

<form method="POST">
    <select name="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <select name="mood">
        <option value="casual">Casual</option>
        <option value="party">Party</option>
        <option value="gym">Gym</option>
        <option value="formal">Formal</option>
        <option value="wedding">Wedding</option>
        <option value="beach">Beach</option>
        <option value="festival">Festival</option>
    </select>

    <input type="text" name="city" placeholder="Enter City" required>

    <button type="submit">Generate Outfit</button>
</form>

{% if weather %}
<div class="weather">
    🌤 {{weather}} | 🌡 {{temp}}°C
</div>
{% endif %}

<div class="container">
{% for p in products %}
    <div class="card">
        <img src="{{p.product_photo}}" alt="{{p.product_title}}">
        <div class="card-content">
            <div class="title">{{p.product_title}}</div>
            <div class="price">{{p.product_price}}</div>
            <div class="stores">
                <a href="{{p.product_url}}" target="_blank" class="store-btn">Buy on Amazon</a>
            </div>
        </div>
    </div>
{% endfor %}
</div>

{% if maps_query %}
<div class="map-section">
    <h2>Nearby Clothing Stores</h2>
    <iframe
        width="100%"
        height="400"
        loading="lazy"
        allowfullscreen
        src="https://www.google.com/maps?q={{maps_query}}&output=embed">
    </iframe>
</div>
{% endif %}

</body>
</html>
